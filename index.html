<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>sleevd</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCl_v7yBddGdkldYyiKFoR8wQ73R5LdAN0",
  authDomain: "sleevd-7214c.firebaseapp.com",
  projectId: "sleevd-7214c",
  storageBucket: "sleevd-7214c.firebasestorage.app",
  messagingSenderId: "176444568903",
  appId: "1:176444568903:web:0acce08ab1f18b8fe30862",
  measurementId: "G-67S1G9KPJM"
  };

  try {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.fs = { collection, onSnapshot, doc, setDoc, addDoc, deleteDoc };
    console.log("Firebase initialized");
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => window.startApp());
    } else {
      window.startApp();
    }
  } catch (e) { console.error("Firebase Initialization Error:", e); }
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --md-primary: #E8192C;
  --md-surface: #0A0A0A;
  --md-surface-1: #111111;
  --md-surface-2: #191919;
  --md-on-surface: #F0F0F0;
  --md-on-surface-variant: #999999;
  --md-outline: #444;
}
html, body { height: 100vh; width: 100vw; overflow: hidden; background: var(--md-surface); color: var(--md-on-surface); font-family: 'Google Sans', sans-serif; }

.view { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--md-surface); transition: transform 0.4s cubic-bezier(0.1,0.9,0.2,1); z-index: 10; }
.view.offscreen-right { transform: translateX(100%); }
.view.offscreen-left { transform: translateX(-20%); opacity: 0.5; }

.scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(100px + var(--safe-bottom)); }
.scroll-body::-webkit-scrollbar { display: none; }

.top-bar { display: flex; align-items: center; padding: var(--safe-top) 16px 0; height: calc(75px + var(--safe-top)); flex-shrink: 0; z-index: 20; }
.brand { font-family: 'Google Sans Display'; font-size: 28px; font-weight: 700; letter-spacing: -1.2px; flex: 1; }
.total-count-pill { background: var(--md-surface-2); padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: 700; color: var(--md-primary); margin-right: 8px; }

.player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
.player-tile { border-radius: 24px; overflow: hidden; background: var(--md-surface-2); position: relative; aspect-ratio: 1; }
.tile-img { width: 100%; height: 100%; object-fit: cover; }

.card-item { display: flex; align-items: center; gap: 14px; padding: 12px; border-radius: 18px; margin-bottom: 8px; background: var(--md-surface-1); }
.card-item.not-owned { opacity: 0.45; filter: grayscale(0.5); border: 1px dashed #444; }
.card-thumb { width: 55px !important; height: 75px !important; border-radius: 6px; object-fit: cover; background: #222; flex-shrink: 0; }

.input-group { position: relative; margin-bottom: 20px; }
.input-field { width: 100%; background: transparent; border: 1.5px solid var(--md-outline); border-radius: 12px; padding: 16px; color: #fff; font-size: 16px; font-family: inherit; outline: none; transition: border-color 0.2s; }
.input-field:focus { border-color: var(--md-primary); }
.input-label { position: absolute; left: 12px; top: -8px; background: var(--md-surface-2); padding: 0 4px; font-size: 12px; color: var(--md-on-surface-variant); }

.detail-item { margin-bottom: 16px; }
.detail-label { font-size: 12px; color: var(--md-on-surface-variant); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.detail-value { font-size: 15px; color: #fff; font-weight: 500; }

.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--md-surface-2); border-radius: 32px 32px 0 0; z-index: 1000; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.15, 0.85, 0.35, 1); padding-bottom: var(--safe-bottom); max-height: 95vh; display: flex; flex-direction: column; }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: #444; border-radius: 2px; margin: 12px auto; flex-shrink: 0; }
.sheet-body { padding: 0 24px 24px; overflow-y: auto; flex: 1; }

.scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.8); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999; }
.scrim.open { opacity: 1; pointer-events: auto; }

.primary-btn { width: 100%; background: var(--md-primary); color: #fff; border: none; padding: 18px; border-radius: 50px; font-weight: 700; font-size: 16px; cursor: pointer; }
.sport-badge-row { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; z-index: 5; }
.sport-icon { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.fab { position: absolute; bottom: calc(24px + var(--safe-bottom)); right: 20px; width: 64px; height: 64px; border-radius: 20px; background: var(--md-primary); color: #fff; border: none; z-index: 50; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
</style>
</head>
<body>

<div class="view" id="gallery-view">
  <div class="top-bar">
    <span class="brand">sleevd</span>
    <div class="total-count-pill" id="totalOwnedCounter">0</div>
    <button class="icon-btn" onclick="window.openPlayerForm()"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></button>
  </div>
  <div class="scroll-body"><div class="player-grid" id="playerGrid"></div></div>
</div>

<div class="view offscreen-right" id="detail-view">
  <div style="height: 25vh; position: relative; flex-shrink: 0; background: #000;">
    <img id="playerBanner" style="width:100%; height:100%; object-fit:cover; opacity: 0.6;">
    <div style="position:absolute; inset:0; background:linear-gradient(transparent, var(--md-surface));"></div>
    <button class="icon-btn" onclick="history.back()" style="position:absolute; top:var(--safe-top); left:12px; background:rgba(0,0,0,0.4); border-radius:50%; z-index: 30;"><svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
  </div>
  <div style="margin-top:-50px; padding: 0 16px 20px; position:relative; display:flex; align-items:flex-end; gap:16px; z-index:15;">
    <img id="playerThumb" style="width:85px; height:115px; border-radius:12px; border:3px solid var(--md-surface); object-fit:cover; background:#222;">
    <div style="padding-bottom:5px;">
      <h2 id="playerName" style="font-size:24px; font-family:'Google Sans Display';"></h2>
      <div id="playerDetailCount" style="font-size:12px; color:var(--md-on-surface-variant); font-weight:700;"></div>
      <button onclick="window.openPlayerForm(window.selectedPlayer.id)" style="background:rgba(255,255,255,0.1); border:none; color:#fff; padding:5px 12px; border-radius:50px; font-size:11px; margin-top:8px;">Edit Profile</button>
    </div>
  </div>
  <div class="scroll-body" style="padding:0 16px;"><div id="cardList"></div></div>
  <button class="fab" onclick="window.openCardForm()"><svg viewBox="0 0 24 24" width="32" height="32" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
</div>

<div class="scrim" id="detailScrim" onclick="history.back()"></div>
<div class="sheet" id="cardDetailSheet"><div class="sheet-handle"></div><div class="sheet-body" id="cardDetailBody"></div></div>

<div class="scrim" id="modalScrim" onclick="history.back()"></div>
<div class="sheet" id="pSheet"><div class="sheet-handle"></div><div class="sheet-body" id="pBody"></div></div>
<div class="sheet" id="cSheet"><div class="sheet-handle"></div><div class="sheet-body" id="cBody"></div></div>

<script>
// HOISTED HELPER FUNCTIONS
window.input = (id, label, val) => `
    <div class="input-group">
        <div class="input-label">${label}</div>
        <input id="${id}" class="input-field" value="${val || ''}">
    </div>
`;

let ALL_PLAYERS = [], ALL_CARDS = [], selectedPlayer = null, isLP = false, lpTimer;
const SPORT_ICONS = { Basketball: '🏀', Football: '🏈', Baseball: '⚾', Golf: '⛳' };

function getCleanImg(url) {
  if (!url) return '';
  if (url.includes('drive.google.com')) {
    const id = url.split('id=')[1] || url.split('/d/')[1].split('/')[0];
    return `https://lh3.googleusercontent.com/u/0/d/${id}=w800`;
  }
  if (url.includes('tcdb.com')) {
    return `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent(url)}`;
  }
  return url;
}

window.startApp = function() {
  if (!window.fs) return;
  const { onSnapshot, collection } = window.fs;
  onSnapshot(collection(window.db, "Players"), snap => {
    ALL_PLAYERS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderGallery();
  });
  onSnapshot(collection(window.db, "Cards"), snap => {
    ALL_CARDS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('totalOwnedCounter').innerText = ALL_CARDS.filter(c => c.Owned === true || c.Owned === "true").length;
    renderGallery();
    if(window.selectedPlayer) renderDetail(window.selectedPlayer);
  });
};

function renderGallery() {
  const grid = document.getElementById('playerGrid');
  const sorted = [...ALL_PLAYERS].sort((a,b) => {
    const aO = ALL_CARDS.filter(c => c.Player === a.id && (c.Owned === true || c.Owned === "true")).length;
    const bO = ALL_CARDS.filter(c => c.Player === b.id && (c.Owned === true || c.Owned === "true")).length;
    return bO - aO;
  });
  grid.innerHTML = sorted.map(p => {
    const pC = ALL_CARDS.filter(c => c.Player === p.id);
    const o = pC.filter(c => c.Owned === true || c.Owned === "true").length;
    const icons = [...new Set(pC.map(c => c.Sport).filter(Boolean))].map(s => `<div class="sport-icon">${SPORT_ICONS[s] || '🃏'}</div>`).join('');
    return `<div class="player-tile" onclick="window.openDetail('${p.id.replace(/'/g, "\\'")}')">
      <div class="sport-badge-row">${icons}</div>
      <img class="tile-img" src="${getCleanImg(p['Main Image'])}" loading="lazy">
      <div style="position:absolute; inset:0; background:linear-gradient(transparent, rgba(0,0,0,0.9));"></div>
      <div style="position:absolute; bottom:12px; left:12px;"><div style="font-weight:700;">${p.Player || p.id}</div><div style="font-size:11px; opacity:0.8;">${o} owned</div></div>
    </div>`;
  }).join('');
}

window.openDetail = (id) => {
  window.selectedPlayer = ALL_PLAYERS.find(p => p.id === id);
  history.pushState({v:'detail'}, '');
  renderDetail(window.selectedPlayer);
  document.getElementById('detail-view').classList.remove('offscreen-right');
};

function renderDetail(player) {
  let cards = ALL_CARDS.filter(c => c.Player === player.id);
  cards.sort((a,b) => (a.Year || "").localeCompare(b.Year || ""));
  document.getElementById('playerName').innerText = player.Player || player.id;
  document.getElementById('playerBanner').src = getCleanImg(player['Banner_Image']);
  document.getElementById('playerThumb').src = getCleanImg(player['Main Image']);
  document.getElementById('playerDetailCount').innerText = `${cards.filter(c => c.Owned === true || c.Owned === "true").length} Owned`;
  document.getElementById('cardList').innerHTML = cards.map(c => `
    <div class="card-item ${!(c.Owned===true||c.Owned==="true")?'not-owned':''}" onclick="window.handleCardTap('${c.id}')" 
         onmousedown="window.startLP('${c.id}')" onmouseup="clearTimeout(window.lpTimer)" ontouchstart="window.startLP('${c.id}')" ontouchend="clearTimeout(window.lpTimer)">
      <img class="card-thumb" src="${getCleanImg(c['App Image'])}">
      <div class="card-info"><div style="font-weight:600;">${c.Year} ${c.Set || ''}</div><div style="font-size:12px; opacity:0.7;">#${c.Number || 'N/A'}</div></div>
    </div>`).join('');
}

window.startLP = (id) => { window.isLP = false; window.lpTimer = setTimeout(() => { window.isLP = true; window.openCardForm(id); }, 600); };

window.handleCardTap = (id) => {
  if (window.isLP) return;
  const c = ALL_CARDS.find(x => x.id === id);
  const q = encodeURIComponent(`${c.Year} ${c.Set} ${window.selectedPlayer.Player || window.selectedPlayer.id} #${c.Number} sold`);
  const ebUrl = `https://www.ebay.com/sch/i.html?_nkw=${q}&LH_Sold=1&LH_Complete=1`;
  const info = [{l:'Sport',v:c.Sport},{l:'Set',v:c.Set},{l:'Year',v:c.Year},{l:'Number',v:c.Number},{l:'Team',v:c.Team},{l:'Notes',v:c.Notes}];

  document.getElementById('cardDetailBody').innerHTML = `
    <img src="${getCleanImg(c['App Image'])}" style="width:100%; border-radius:24px; margin-bottom:24px;">
    <h2 style="margin-bottom:20px; font-family:'Google Sans Display'">${c.Year} ${c.Set}</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:30px;">
        ${info.filter(f => f.v).map(f => `<div class="detail-item"><div class="detail-label">${f.l}</div><div class="detail-value">${f.v}</div></div>`).join('')}
    </div>
    <div style="display:flex; flex-direction:column; gap:12px;">
        <a href="${ebUrl}" target="_blank" style="text-decoration:none;"><button class="primary-btn" style="background:#0064D2;">Check eBay Sold Value</button></a>
        ${c['Card Information'] ? `<a href="${c['Card Information']}" target="_blank" style="text-decoration:none;"><button class="primary-btn" style="background:#222; border:1px solid #444;">View on TCDB</button></a>` : ''}
    </div>`;
  document.getElementById('cardDetailSheet').classList.add('open');
  document.getElementById('detailScrim').classList.add('open');
  history.pushState({v:'card'}, '');
};

window.openCardForm = (id = null) => {
  const c = id ? ALL_CARDS.find(x => x.id === id) : {};
  const isO = c.Owned === true || c.Owned === "true";
  document.getElementById('cBody').innerHTML = `
    <h2 style="margin-bottom:24px; font-family:'Google Sans Display';">${id ? 'Edit' : 'Add'} Card</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">${window.input('cf-y','Year',c.Year)}${window.input('cf-n','Number',c.Number)}</div>
    ${window.input('cf-s','Set',c.Set)}${window.input('cf-sp','Sport',c.Sport)}${window.input('cf-i','Image URL',c['App Image'])}
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;"><input type="checkbox" id="cf-o" ${isO?'checked':''} style="width:24px;height:24px;"><label>I own this card</label></div>
    <button class="primary-btn" onclick="window.saveCard('${id||''}')">Save Card</button>`;
  document.getElementById('cSheet').classList.add('open');
  document.getElementById('modalScrim').classList.add('open');
  history.pushState({v:'form'}, '');
};

window.saveCard = async (id) => {
  const data = { Player: window.selectedPlayer.id, Year: document.getElementById('cf-y').value, Set: document.getElementById('cf-s').value, Number: document.getElementById('cf-n').value, Sport: document.getElementById('cf-sp').value, "App Image": document.getElementById('cf-i').value, Owned: document.getElementById('cf-o').checked };
  if(id) await window.fs.setDoc(window.fs.doc(window.db, "Cards", id), data, {merge:true});
  else await window.fs.addDoc(window.fs.collection(window.db, "Cards"), data);
  history.back();
};

window.openPlayerForm = (id = null) => {
    const p = id ? ALL_PLAYERS.find(x => x.id === id) : {};
    document.getElementById('pBody').innerHTML = `<h2 style="margin-bottom:24px; font-family:'Google Sans Display';">Player</h2>${window.input('pf-n','Name',p.Player||p.id)}${window.input('pf-m','Main URL',p['Main Image'])}${window.input('pf-b','Banner URL',p['Banner_Image'])}<button class="primary-btn" onclick="window.savePlayer()">Save</button>`;
    document.getElementById('pSheet').classList.add('open');
    document.getElementById('modalScrim').classList.add('open');
    history.pushState({v:'pform'}, '');
};

window.savePlayer = async () => {
    const name = document.getElementById('pf-n').value;
    const data = { Player: name, "Main Image": document.getElementById('pf-m').value, "Banner_Image": document.getElementById('pf-b').value };
    await window.fs.setDoc(window.fs.doc(window.db, "Players", name), data, {merge:true});
    history.back();
};

window.onpopstate = (event) => {
  const state = event.state || {};
  document.querySelectorAll('.sheet, .scrim').forEach(el => { el.classList.remove('open'); el.style.transform = ''; });
  if (state.v === 'card') {
    document.getElementById('cardDetailSheet').classList.add('open');
    document.getElementById('detailScrim').classList.add('open');
  } else if (state.v === 'detail') {
    document.getElementById('detail-view').classList.remove('offscreen-right');
    document.getElementById('gallery-view').classList.add('offscreen-left');
  } else {
    document.getElementById('detail-view').classList.add('offscreen-right');
    document.getElementById('gallery-view').classList.remove('offscreen-left');
    window.selectedPlayer = null;
  }
};

let touchStartY = 0;
const sheet = document.getElementById('cardDetailSheet');
sheet.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
sheet.addEventListener('touchmove', e => {
    const d = e.touches[0].clientY - touchStartY;
    if (d > 0) sheet.style.transform = `translateY(${d}px)`;
});
sheet.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - touchStartY > 150) history.back();
    else sheet.style.transform = '';
});
</script>
</body>
</html>
