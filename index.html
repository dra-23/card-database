<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>sleevd</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCl_v7yBddGdkldYyiKFoR8wQ73R5LdAN0",
  authDomain: "sleevd-7214c.firebaseapp.com",
  projectId: "sleevd-7214c",
  storageBucket: "sleevd-7214c.firebasestorage.app",
  messagingSenderId: "176444568903",
  appId: "1:176444568903:web:0acce08ab1f18b8fe30862",
  measurementId: "G-67S1G9KPJM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.db = db;
  window.fs = { collection, onSnapshot, doc, setDoc, addDoc, deleteDoc };
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --md-primary: #E8192C;
  --md-surface: #0A0A0A;
  --md-surface-1: #111111;
  --md-surface-2: #191919;
  --md-on-surface: #F0F0F0;
  --md-on-surface-variant: #999999;
}
html, body { 
    height: 100vh; 
    width: 100vw;
    overflow: hidden; 
    background: var(--md-surface); 
    color: var(--md-on-surface); 
    font-family: 'Google Sans', sans-serif;
}

/* IMMERSIVE FIXED VIEWS */
.view { 
    position: fixed; 
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex; 
    flex-direction: column; 
    background: var(--md-surface); 
    transition: transform 0.38s cubic-bezier(0.2,0,0,1), opacity 0.3s ease; 
    z-index: 10;
}
.view.offscreen-right { transform: translateX(100%); }
.view.offscreen-left { transform: translateX(-15%); opacity: 0.5; }

.scroll-body { 
    flex: 1; 
    overflow-y: auto; 
    -webkit-overflow-scrolling: touch; 
    padding-bottom: calc(100px + var(--safe-bottom));
}
.scroll-body::-webkit-scrollbar { display: none; }

/* TOP BAR (BLEEDS INTO STATUS BAR) */
.top-bar { 
    display: flex; 
    align-items: center; 
    padding: var(--safe-top) 16px 0; 
    height: calc(80px + var(--safe-top)); 
    flex-shrink: 0; 
    z-index: 20;
}
.brand { font-family: 'Google Sans Display'; font-size: 32px; font-weight: 700; letter-spacing: -1.5px; flex: 1; }
.total-count-pill { background: var(--md-surface-2); padding: 6px 14px; border-radius: 50px; font-size: 14px; font-weight: 700; color: var(--md-primary); margin-right: 8px; }

/* TILES */
.player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
.player-tile { border-radius: 28px; overflow: hidden; background: var(--md-surface-2); position: relative; aspect-ratio: 1; }
.tile-img { width: 100%; height: 100%; object-fit: cover; }
.tile-count { font-size: 11px; opacity: 0.7; }

/* BO JACKSON SPORT BADGES */
.sport-badge-row { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; z-index: 5; }
.sport-icon { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); }

/* UI ELEMENTS */
.icon-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: none; color: var(--md-on-surface); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.fab { 
    position: absolute; 
    bottom: calc(24px + var(--safe-bottom)); 
    right: 20px; 
    width: 64px; height: 64px; 
    border-radius: 20px; 
    background: var(--md-primary); 
    color: #fff; 
    border: none; 
    z-index: 50; 
    display: flex; align-items: center; justify-content: center; 
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); 
}

.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--md-surface-2); border-radius: 32px 32px 0 0; z-index: 1000; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2,0,0,1); padding-bottom: var(--safe-bottom); }
.sheet.open { transform: translateY(0); }
.scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.8); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999; }
.scrim.open { opacity: 1; pointer-events: auto; }
.input-field { width: 100%; background: var(--md-surface-3); border: 1px solid var(--md-outline); border-radius: 12px; padding: 14px; color: #fff; margin-bottom: 12px; font-size: 16px; }
.primary-btn { width: 100%; background: var(--md-primary); color: #fff; border: none; padding: 16px; border-radius: 50px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="view" id="gallery-view">
  <div class="top-bar">
    <span class="brand">sleevd</span>
    <div class="total-count-pill" id="totalOwnedCounter">0</div>
    <button class="icon-btn" onclick="openPlayerForm()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </button>
  </div>
  <div class="scroll-body"><div class="player-grid" id="playerGrid"></div></div>
</div>

<div class="view offscreen-right" id="detail-view">
  <div style="height: 300px; position: relative; flex-shrink: 0;">
    <img id="playerBanner" style="width:100%; height:100%; object-fit:cover;">
    <div style="position:absolute; inset:0; background:linear-gradient(transparent, var(--md-surface));"></div>
    <button class="icon-btn" onclick="history.back()" style="position:absolute; top:var(--safe-top); left:16px; background:rgba(0,0,0,0.4); border-radius:50%; z-index: 30;">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
  </div>
  
  <div style="margin-top:-60px; padding: 0 16px 20px; position:relative; display:flex; align-items:flex-end; gap:16px; z-index:15;">
    <img id="playerThumb" style="width:100px; height:130px; border-radius:12px; border:3px solid var(--md-surface); object-fit:cover; background:#222;">
    <div style="padding-bottom:10px;">
      <h2 id="playerName" style="font-size:26px; font-family:'Google Sans Display';"></h2>
      <div id="playerDetailCount" style="font-size:12px; color:var(--md-on-surface-variant); font-weight:700;"></div>
      <button id="editPlayerBtn" style="background:rgba(255,255,255,0.1); border:none; color:#fff; padding:6px 12px; border-radius:50px; font-size:11px; margin-top:8px;">Edit Profile</button>
    </div>
  </div>

  <div class="scroll-body" style="padding:0 16px 100px;"><div id="cardList"></div></div>

  <button class="fab" onclick="openCardForm()">
    <svg viewBox="0 0 24 24" width="32" height="32" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </button>
</div>

<div class="scrim" id="modalScrim" onclick="history.back()"></div>
<div class="sheet" id="pSheet"><div class="sheet-body" id="pBody"></div></div>
<div class="sheet" id="cSheet"><div class="sheet-body" id="cBody"></div></div>

<script>
let ALL_PLAYERS = [], ALL_CARDS = [], selectedPlayer = null, longPressTimer;

// BO JACKSON / MULTI-SPORT LOGIC
const SPORT_ICONS = { Basketball: '🏀', Football: '🏈', Baseball: '⚾', Golf: '⛳', Hockey: '🏒', Soccer: '⚽' };

function getCleanImg(url) {
  if (!url) return '';
  
  // 1. Handle Google Drive
  if (url.includes('drive.google.com')) {
    const id = url.split('id=')[1] || url.split('/d/')[1].split('/')[0];
    return `https://lh3.googleusercontent.com/u/0/d/${id}=w800`;
  }

  // 2. Handle TCDB (Hotlink Hotlink Fix)
  if (url.includes('tcdb.com')) {
    // We use a public CORS proxy to fetch the image, bypassing TCDB's hotlink block.
    return `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent(url)}`;
  }
  
  return url;
}

window.onpopstate = () => {
  document.querySelectorAll('.view').forEach(v => v.id !== 'gallery-view' && v.classList.add('offscreen-right'));
  document.getElementById('gallery-view').classList.remove('offscreen-left');
  document.querySelectorAll('.sheet, .scrim').forEach(el => el.classList.remove('open'));
};

function init() {
  if (!window.fs) { setTimeout(init, 100); return; }
  const { onSnapshot, collection } = window.fs;

  onSnapshot(collection(window.db, "Players"), (snap) => {
    ALL_PLAYERS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderGallery();
  });

  onSnapshot(collection(window.db, "Cards"), (snap) => {
    ALL_CARDS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const totalOwned = ALL_CARDS.filter(c => c.Owned === true || c.Owned === "true").length;
    document.getElementById('totalOwnedCounter').innerText = totalOwned;
    renderGallery();
    if(selectedPlayer) renderDetail(selectedPlayer);
  });
}

function renderGallery() {
  const grid = document.getElementById('playerGrid');
  const sorted = [...ALL_PLAYERS].sort((a,b) => {
    const aO = ALL_CARDS.filter(c => c.Player === a.id && (c.Owned === true || c.Owned === "true")).length;
    const bO = ALL_CARDS.filter(c => c.Player === b.id && (c.Owned === true || c.Owned === "true")).length;
    return bO - aO;
  });

  grid.innerHTML = sorted.map(p => {
    const pCards = ALL_CARDS.filter(c => c.Player === p.id);
    const ownedCount = pCards.filter(c => c.Owned === true || c.Owned === "true").length;
    
    // Multi-Sport scan for this player
    const uniqueSports = [...new Set(pCards.map(c => c.Sport).filter(Boolean))];
    const sportIcons = uniqueSports.map(s => `<div class="sport-icon">${SPORT_ICONS[s] || '🃏'}</div>`).join('');

    return `
    <div class="player-tile" onclick="openDetail('${p.id.replace(/'/g, "\\'")}')">
      <div class="sport-badge-row">${sportIcons}</div>
      <img class="tile-img" src="${getCleanImg(p['Main Image'])}" loading="lazy">
      <div style="position:absolute; inset:0; background:linear-gradient(transparent, rgba(0,0,0,0.9));"></div>
      <div style="position:absolute; bottom:12px; left:12px;">
        <div style="font-weight:700; font-size:14px; line-height:1.1;">${p.Player || p.id}</div>
        <div class="tile-count">${ownedCount} owned</div>
      </div>
    </div>`;
  }).join('');
}

function openDetail(id) {
  selectedPlayer = ALL_PLAYERS.find(p => p.id === id);
  history.pushState({v:'detail'}, '');
  renderDetail(selectedPlayer);
  document.getElementById('detail-view').classList.remove('offscreen-right');
  document.getElementById('gallery-view').classList.add('offscreen-left');
}

function renderDetail(player) {
  let cards = ALL_CARDS.filter(c => c.Player === player.id);
  cards.sort((a,b) => (a.Year || "").localeCompare(b.Year || ""));

  document.getElementById('playerName').innerText = player.Player || player.id;
  document.getElementById('playerBanner').src = getCleanImg(player['Banner_Image']);
  document.getElementById('playerThumb').src = getCleanImg(player['Main Image']);
  const ownedTotal = ALL_CARDS.filter(c => c.Player === player.id && (c.Owned === true || c.Owned === "true")).length;
  document.getElementById('playerDetailCount').innerText = `${ownedTotal} Owned`;
  document.getElementById('editPlayerBtn').onclick = (e) => { e.stopPropagation(); openPlayerForm(player.id); };

  document.getElementById('cardList').innerHTML = cards.map(c => `
    <div class="card-item" onclick="openCardForm('${c.id}')">
      <img class="card-thumb" src="${getCleanImg(c['App Image'])}">
      <div class="card-info">
        <div style="font-weight:600;">${c.Year} ${c.Set || c.Manufacturer || ''}</div>
        <div style="font-size:12px; color:var(--md-on-surface-variant);">Purchased: ${c.Year || 'N/A'}</div>
      </div>
    </div>`).join('');
}

const input = (id, label, val) => `
    <div style="position:relative; margin-bottom:12px;">
        <label style="position:absolute; top:-7px; left:10px; background:var(--md-surface-2); padding:0 4px; font-size:11px; color:var(--md-on-surface-variant);">${label}</label>
        <input id="${id}" class="input-field" value="${val || ''}" placeholder="${label}" style="margin:0;">
    </div>
`;

window.openPlayerForm = (id = null) => {
    history.pushState({v:'pform'}, '');
    const p = id ? ALL_PLAYERS.find(x => x.id === id) : {};
    document.getElementById('pBody').innerHTML = `
        <h2 class="sheet-title">Player Profile</h2>
        ${input('pf-name', 'Name', p.Player || p.id)}
        ${input('pf-main', 'Main Image URL', p['Main Image'])}
        ${input('pf-banner', 'Banner Image URL', p['Banner_Image'])}
        <button class="primary-btn" onclick="savePlayer('${id||''}')">Save</button>
    `;
    document.getElementById('pSheet').classList.add('open');
    document.getElementById('modalScrim').classList.add('open');
};

window.savePlayer = async () => {
    const name = document.getElementById('pf-name').value;
    const data = { Player: name, "Main Image": document.getElementById('pf-main').value, "Banner_Image": document.getElementById('pf-banner').value };
    await window.fs.setDoc(window.fs.doc(window.db, "Players", name), data, {merge:true});
    history.back();
};

window.openCardForm = (id = null) => {
  history.pushState({v:'cform'}, '');
  const c = id ? ALL_CARDS.find(x => x.id === id) : {};
  const isO = c.Owned === true || c.Owned === "true";
  
  document.getElementById('cBody').innerHTML = `
    <h2 class="sheet-title">${id ? 'Edit' : 'Add'} Card</h2>
    ${input('cf-year', 'Year', c.Year)}
    ${input('cf-set', 'Set', c.Set)}
    ${input('cf-sport', 'Sport (e.g. Baseball)', c.Sport)}
    ${input('cf-img', 'Image URL', c['App Image'])}
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
        <input type="checkbox" id="cf-owned" ${isO?'checked':''} style="width:20px;height:20px;">
        <label>I own this card</label>
    </div>
    <button class="primary-btn" onclick="saveCard('${id||''}')">Save</button>
  `;
  document.getElementById('cSheet').classList.add('open');
  document.getElementById('modalScrim').classList.add('open');
};

window.saveCard = async (id) => {
  const data = { Player: selectedPlayer.id, Year: document.getElementById('cf-year').value, Set: document.getElementById('cf-set').value, Sport: document.getElementById('cf-sport').value, "App Image": document.getElementById('cf-img').value, Owned: document.getElementById('cf-owned').checked };
  if(id) await window.fs.setDoc(window.fs.doc(window.db, "Cards", id), data, {merge:true});
  else await window.fs.addDoc(window.fs.collection(window.db, "Cards"), data);
  history.back();
};

init();
</script>
</body>
</html>
